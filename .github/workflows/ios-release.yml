name: iOS Release (TestFlight)

# 署名つきアーカイブを作って TestFlight に配信する（#196）。
# 署名は App Store Connect API キー(.p8)による「自動署名」で行う（証明書/プロビジョニングの
# 手動管理・fastlane match は不要）。物理 Mac 不要・GitHub Actions の macOS runner で完結。
#
# 前提（揃うまで成功しない。揃うまでは手動トリガー時のみ実行され、PR は汚さない）:
#   1. #193 がマージ済み（frontend に Capacitor 一式があること）
#   2. App ID `me.noshi.app` を登録し、App Store Connect にアプリレコード作成済み（#210）
#   3. 下記 Secrets を設定済み（docs/ios/testflight-setup.md 参照）
#        ASC_KEY_ID, ASC_ISSUER_ID, ASC_API_KEY_P8, APPLE_TEAM_ID
#
# 実行契機: 手動（workflow_dispatch）または ios-v* タグの push。

on:
  workflow_dispatch:
  push:
    tags:
      - "ios-v*"

concurrency:
  group: ios-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  testflight:
    name: archive & upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 45
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - name: select latest Xcode (App Store は iOS 26 SDK / Xcode 26+ を要求)
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "installed Xcodes:"; ls -d /Applications/Xcode_*.app 2>/dev/null
          echo "selecting: $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version
          xcodebuild -showsdks | grep -i iphoneos || true
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: revoke stale cloud-signing certs (証明書上限の回避 #206)
        # クラウド署名が毎ビルド作る使い捨て開発証明書を失効し、Apple の証明書上限到達を防ぐ。
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          pip3 install --quiet --break-system-packages pyjwt cryptography
          python3 ../scripts/revoke-stale-ios-certs.py

      - name: install deps & build web
        # 本番の API/Cognito 設定を注入（未注入だと認証無効・API先が空になる）。値は公開設定（GitHub Variables）。
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
          VITE_AWS_REGION: ap-northeast-1
        run: |
          npm ci
          npm run build

      - name: add iOS platform & sync (SPM)
        run: |
          npx cap add ios
          npx cap sync ios

      - name: configure Info.plist (URLスキーム #204 / 輸出コンプラ #213)
        run: bash ../scripts/ios-configure-plist.sh ios/App/App/Info.plist

      - name: generate app icon & splash (#206)
        # frontend/assets/ の icon-only.png / splash*.png から iOS のアイコン・スプラッシュを生成。
        run: npx capacitor-assets generate --ios

      - name: write ASC API key
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$ASC_API_KEY_P8" > "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8"

      - name: set build number (CI run number)
        run: |
          cd ios/App
          # TestFlight はビルド番号の重複を許さないため CI 連番を使う。
          xcrun agvtool new-version -all "${{ github.run_number }}"

      - name: archive (auto-sign via ASC API key)
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild \
            -workspace ios/App/App.xcodeproj/project.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            archive

      - name: export ipa
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/App.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ci/exportOptions.plist \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA=$(find "$RUNNER_TEMP/export" -name '*.ipa' | head -1)
          echo "uploading: $IPA"
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey "$ASC_KEY_ID" --apiIssuer "$ASC_ISSUER_ID"

      - name: cleanup secrets
        if: always()
        run: rm -f "$HOME/private_keys/AuthKey_"*.p8
