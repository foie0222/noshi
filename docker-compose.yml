# noshi ローカル開発（本番同型）: DynamoDB Local + LocalStack(SQS,S3) + backend + frontend
services:
  dynamodb:
    image: amazon/dynamodb-local:latest
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory", "-sharedDb"]
    ports: ["8001:8000"]
  localstack:
    image: localstack/localstack:latest
    environment:
      - SERVICES=sqs,s3
    ports: ["4566:4566"]
  backend:
    build: ./backend
    environment:
      - DYNAMODB_ENDPOINT=http://dynamodb:8000
      - AWS_REGION=ap-northeast-1
      - AWS_ACCESS_KEY_ID=local
      - AWS_SECRET_ACCESS_KEY=local
      - NOSHI_TABLE=noshi
    ports: ["8000:8000"]
    depends_on: [dynamodb, localstack]
  frontend:
    build: ./frontend
    ports: ["5173:5173"]
    depends_on: [backend]
