name: iOS

# Capacitor で内包した iOS アプリが macOS runner でビルドできることを検証する（#193）。
# 物理 Mac を持たずに GitHub Actions の macOS runner を「クラウドの Mac」として使う前提。
# 初回は署名なし（シミュレータ SDK ビルド）で「コンパイルが通る」ことだけを確認する。
# 署名つきアーカイブ／TestFlight への配信は証明書・ASC API キーを Secrets に入れてから（#196）。

on:
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ios.yml"
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/ios.yml"
  workflow_dispatch:

concurrency:
  group: ios-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ios (capacitor / xcodebuild)
    runs-on: macos-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@9f698171ed81b15d1823a05fc7211befd50c8ae0 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: install deps
        run: npm ci
      - name: build web (dist)
        # 本番の API/Cognito 設定を注入（未注入だと認証無効・API先が空になる）。値は公開設定（GitHub Variables）。
        env:
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          VITE_COGNITO_CLIENT_ID: ${{ vars.VITE_COGNITO_CLIENT_ID }}
          VITE_COGNITO_DOMAIN: ${{ vars.VITE_COGNITO_DOMAIN }}
          VITE_AWS_REGION: ap-northeast-1
        run: npm run build
      - name: add iOS platform
        # ios/ はコミットしていないため CI 上で都度生成する（初回検証フェーズ）。
        run: npx cap add ios
      - name: sync (copy web + resolve SPM)
        # Capacitor 8 は CocoaPods ではなく Swift Package Manager で依存解決する
        # （生成物は ios/App/App.xcodeproj/project.xcworkspace。Pods/・App.xcworkspace は無い）。
        run: npx cap sync ios
      - name: configure Info.plist (URLスキーム #204 / 輸出コンプラ #213)
        run: bash ../scripts/ios-configure-plist.sh ios/App/App/Info.plist
      - name: generate app icon & splash (#206)
        # frontend/assets/ の icon-only.png / splash*.png から iOS のアイコン・スプラッシュを生成。
        run: npx capacitor-assets generate --ios
      - name: locate xcworkspace
        id: ws
        # Capacitor のバージョンで生成パスが変わりうるため動的に探索する。
        run: |
          echo "--- ios tree ---"
          find ios -maxdepth 4 \( -name '*.xcworkspace' -o -name '*.xcodeproj' \) | sort
          WS=$(find ios -maxdepth 4 -name '*.xcworkspace' | head -1)
          if [ -z "$WS" ]; then
            echo "::error::xcworkspace が見つからない"; ls -R ios | head -80; exit 1
          fi
          echo "workspace=$WS" >> "$GITHUB_OUTPUT"
          echo "found workspace: $WS"
      - name: xcodebuild (simulator, unsigned)
        # シミュレータ SDK 向けビルドは署名不要。コンパイルが通ることだけを確認する。
        run: |
          xcodebuild \
            -workspace "${{ steps.ws.outputs.workspace }}" \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            build
