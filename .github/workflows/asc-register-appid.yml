name: ASC Register App ID

# App Store Connect API で App ID(me.noshi.app) を登録し Sign in with Apple capability を
# 有効化する（#210/#204）。UI ログイン不要で実施できる Apple 側作業の自動化。
# push 起動にしているため main マージ前に一度だけ走らせられる。冪等（再実行安全）。

on:
  push:
    branches: [chore/asc-appid-register]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  register:
    name: register bundle id + capabilities
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - name: install deps
        run: pip install "pyjwt[crypto]==2.10.1"
      - name: register App ID + Sign in with Apple
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: python scripts/asc_register_appid.py
