name: Claude Code Review

# PR 作成時に Claude が差分をレビューし、指摘を「正式な PR レビュー＋インライン行コメント」
# （＝解決可能なスレッド）として投稿する。未解決スレッドがあるとマージできない運用
# （ruleset の required_review_thread_resolution）と組み合わせ、指摘が残る限りマージを止める。
# 誤検知はそのスレッドを Resolve すればマージ可。
# 認証は Max サブスクの OAuth トークン（secret CLAUDE_CODE_OAUTH_TOKEN）。追加課金なし。
on:
  pull_request:
    types: [opened]
    branches: [main]

# レビュー（インラインコメント）投稿に pull-requests: write が必要。
permissions:
  contents: read
  pull-requests: write
  issues: write

# 同一PRで多重起動しないよう直列化。
concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest
    timeout-minutes: 20 # 青天井のハングを防ぐ
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # 差分の基点（main）を取るため全履歴を取得

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # use_sticky_comment は付けない（既定 false）。総括1個に丸めず、
          # 指摘ごとにインライン行コメント＝解決可能スレッドを残させるため。
          claude_args: "--max-turns 40"
          prompt: |
            この PR の変更（差分）をレビューしてください。

            - リポジトリ直下の REVIEW.md を最優先のレビュー方針として厳守し、CLAUDE.md / AGENTS.md の規約も踏まえること。
            - 応答・指摘はすべて日本語で書くこと。
            - 指摘は、問題のある **変更行に対するインラインのレビューコメント**（行を指定したレビューコメント）として残すこと。
              総括コメント1個にまとめず、1指摘1コメントで該当行に付ける（＝解決可能なスレッドにする）。
            - 各指摘の先頭に重大度を付ける：🔴 [Important] / 🟡 [Nit]。
            - レビュー全体の本文（summary）には一行サマリを書く（例「重大2・軽微1」）。
              指摘が一つも無ければ本文に「ブロッカーなし」とだけ書く。
