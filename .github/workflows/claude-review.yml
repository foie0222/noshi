name: Claude Code Review

# [検証用] MCP インラインツール方式: mcp__github_inline_comment__create_inline_comment で
# 指摘を直接インライン投稿させる。これが「解決可能スレッド」になり required_review_thread_resolution
# に効くかを確認する。
on:
  pull_request:
    types: [opened]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          # 分類を切って即投稿。インラインツール＋差分取得＋サマリ用の gh pr comment を許可。
          classify_inline_comments: "false"
          claude_args: |
            --max-turns 30
            --allowedTools Read,Grep,Glob,Bash(git diff:*),Bash(cat:*),mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*)
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            この PR の変更をレビューしてください。
            - `git diff origin/main...HEAD` で差分を取得。`cat REVIEW.md` `cat AGENTS.md` を読み観点を把握。
              REVIEW.md を最優先で厳守。すべて日本語。
            - 指摘は **`mcp__github_inline_comment__create_inline_comment`（confirmed: true）** で、
              該当する変更行に**1指摘1インラインコメント**として投稿する。各先頭に 🔴 [Important] / 🟡 [Nit]。
            - 最後に一行サマリ（例「重大2・軽微1」）を `gh pr comment` で投稿（指摘ゼロなら「ブロッカーなし」）。
