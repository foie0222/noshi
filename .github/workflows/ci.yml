name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (ruff / mypy / pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - name: ruff lint
        run: ruff check .
      - name: ruff format check
        run: ruff format --check .
      - name: mypy (strict)
        run: mypy
      - name: pytest
        run: pytest -q

  frontend:
    name: frontend (biome / tsc / vitest / build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: biome
        run: npx biome ci src
      - name: typecheck
        run: npm run typecheck
      - name: vitest
        run: npm test
      - name: build
        run: npm run build

  infra:
    name: infra (cdk synth)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/cdk
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: infra/cdk/package-lock.json
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: npm ci
      - name: cdk synth
        run: npx cdk synth

  # main への push のみ・全チェック通過後に AWS へ自動デプロイ（OIDC ロール）。
  deploy:
    name: deploy to AWS (main)
    needs: [backend, frontend, infra]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-northeast-1
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install CDK deps
        working-directory: infra/cdk
        run: npm ci
      - name: deploy backend stacks
        working-directory: infra/cdk
        run: >
          npx cdk deploy
          NoshiDataStack NoshiAuthStack NoshiMessagingStack NoshiApiStack NoshiWorkerStack
          --require-approval never
          --outputs-file cdk-outputs.json
      - name: build frontend (point at deployed API + Cognito)
        working-directory: frontend
        run: |
          npm ci
          API=$(node -p "require('../infra/cdk/cdk-outputs.json').NoshiApiStack.ApiUrl")
          CLIENT=$(node -p "require('../infra/cdk/cdk-outputs.json').NoshiAuthStack.UserPoolClientId")
          VITE_API_BASE="$API" VITE_COGNITO_CLIENT_ID="$CLIENT" VITE_AWS_REGION=ap-northeast-1 npm run build
      - name: deploy frontend (ACM us-east-1 + S3 + CloudFront + Route53)
        working-directory: infra/cdk
        run: npx cdk deploy NoshiCertificateStack NoshiFrontendStack --require-approval never --outputs-file cdk-outputs-frontend.json
      - name: print site url
        working-directory: infra/cdk
        run: |
          node -p "require('./cdk-outputs-frontend.json').NoshiFrontendStack.SiteUrl"
