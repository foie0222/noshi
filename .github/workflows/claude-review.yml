name: Claude Code Review

# レビューは PR 作成時（opened）のみ実行する。指摘は公式 MCP ツール
# mcp__github_inline_comment__create_inline_comment で **インライン行コメント**として投稿し、
# これが「解決可能なスレッド」になる。未解決のままだとマージ不可
# （ruleset の required_review_thread_resolution）。誤検知はそのスレッドを Resolve すればマージ可。
#
# トリガに synchronize も含めるが、**push 時は再レビューせず即パス**する。狙い:
#  - 「Claude review」を必須チェックにできる → opened のレビュー完了まで必須チェックが pending となり、
#    レビュー前のすり抜けマージを防げる。
#  - push 後も「Claude review」チェックが HEAD に存在（即パス）するので永久 BLOCK にならない。
#  - 再レビューしないので Max 枠を食わず、Nit ループも起きない（実質「PR 作成時のみレビュー」）。
#
# 認証は Max サブスクの OAuth トークン（secret CLAUDE_CODE_OAUTH_TOKEN）。追加課金なし。
# レビュー観点は repo 直下の REVIEW.md で定義。
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  # opened のレビューを途中で殺さない（push は後ろに直列化される）。
  group: claude-review-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  review:
    name: Claude review
    runs-on: ubuntu-latest
    timeout-minutes: 20 # 青天井のハングを防ぐ
    steps:
      # push（synchronize 等）では再レビューせず通過。PR 作成時のレビュー結果（スレッド）を維持する。
      # この空通過により必須チェック「Claude review」が新 HEAD でも緑になり、永久 BLOCK を防ぐ。
      - name: skip review on push (opened のみ本レビュー)
        if: github.event.action != 'opened'
        run: echo "push 後は再レビューしない。PR 作成時のレビュー結果（未解決スレッド）を維持。"

      - uses: actions/checkout@v6
        if: github.event.action == 'opened'
        with:
          fetch-depth: 0 # 差分の基点（main）を取るため全履歴を取得

      # 公式 MCP インラインツールで、指摘を該当行に直接投稿（＝解決可能スレッド）。
      - uses: anthropics/claude-code-action@v1
        if: github.event.action == 'opened'
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          classify_inline_comments: "false" # 分類を挟まず即投稿
          claude_args: |
            --max-turns 30
            --allowedTools Read,Grep,Glob,Bash(git diff:*),Bash(git log:*),Bash(cat:*),mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*)
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            この PR の変更をレビューしてください。

            手順:
            1. `git diff origin/main...HEAD`（失敗時は `git diff HEAD~1 HEAD`）で差分を取得。
            2. `cat REVIEW.md` `cat AGENTS.md` `cat CLAUDE.md` を読み、観点を把握。REVIEW.md を最優先で厳守。
            3. 指摘は **`mcp__github_inline_comment__create_inline_comment`（confirmed: true）** で、
               該当する変更行に **1 指摘 1 インラインコメント**として投稿する。各本文の先頭に重大度を `High:` / `Medium:` / `Low:` で付ける。
            4. 行を特定できない指摘は、最後のサマリ本文に「path:line 付き」でまとめる。
            5. 最後に **一度だけ** `gh pr comment` で一行サマリを投稿する（例「High 1 / Medium 2 / Low 1」。指摘ゼロなら「ブロッカーなし」）。
               サマリの二重投稿はしない。
            6. すべて日本語で書くこと。
